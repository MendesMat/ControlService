# =============================================================================
# 05-prometheus-pvc.yaml
# PersistentVolumeClaim para o Prometheus
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  labels:
    app: prometheus
    tier: monitoring
    project: controlservice
spec:
  # ReadWriteOnce: o volume pode ser montado por exatamente 1 Pod por vez.
  # Adequado para o Prometheus, que é Single-Writer por natureza (TSDB local).
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # 5 Gi: margem conservadora para retenção de 15 dias (padrão Prometheus)
      # com as métricas da aplicação + métricas de infra do cluster.
      storage: 5Gi
