# =============================================================================
# 09-grafana-deployment.yaml
# Deployment do Grafana
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-deployment
  labels:
    app: grafana
    tier: monitoring
    project: controlservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
        tier: monitoring
        project: controlservice
    spec:
      containers:
        - name: grafana
          # Imagem oficial OSS pinned na versão major 10 para estabilidade.
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
              name: grafana-port

          # ── Configuração (Ambiente) ──────────────────────────────────────────
          env:
            # Credenciais do admin (em produção real, usar K8s Secret)
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"

            # Desabilita o sign-up público (boas práticas de segurança)
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"

            # URL pública do Grafana (usada em alertas e compartilhamento)
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:30030"

            # Provisioning automático do datasource Prometheus via env
            # (alternativa ao arquivo de provisioning para escopo do projeto)
            - name: GF_DATASOURCES_DEFAULT_URL
              value: "http://prometheus-service:9090"

          # ── Recursos ────────────────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
